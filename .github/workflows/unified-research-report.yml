name: Unified Taiwan-US research report
on:
  workflow_dispatch:
    inputs:
      taiwan_limit:
        description: Taiwan public symbols per research scan
        required: true
        default: '100'
      us_limit:
        description: US large-cap symbols per research scan
        required: true
        default: '100'
      batch_size:
        description: Symbols per public-data request
        required: true
        default: '50'
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: 台股動能研究掃描
        continue-on-error: true
        run: python -m src.run_taiwan_momentum_scan --limit ${{ inputs.taiwan_limit }} --batch-size ${{ inputs.batch_size }} --offset 0 --universe-file data/runtime-taiwan-universe.json
      - name: 美股動能研究掃描
        continue-on-error: true
        run: python -m src.run_us_momentum_scan --limit ${{ inputs.us_limit }} --batch-size ${{ inputs.batch_size }}
      - name: 台股裸 K 結構研究掃描
        continue-on-error: true
        run: python -m src.run_taiwan_price_action_scan --limit ${{ inputs.taiwan_limit }} --batch-size ${{ inputs.batch_size }} --offset 0 --universe-file data/runtime-taiwan-universe.json
      - name: 美股裸 K 結構研究掃描
        continue-on-error: true
        run: python -m src.run_us_price_action_scan --limit ${{ inputs.us_limit }} --batch-size ${{ inputs.batch_size }}
      - run: python -m src.run_research_report
      - run: python -m src.refresh_market_data
      - name: 保存最新公開研究摘要
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/research-report.json site/data/market.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: refresh public research report"
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "無法在三次嘗試內回存研究摘要。"
              exit 1
            fi

            git fetch origin main
            git rebase -X theirs origin/main
          done
      - uses: actions/upload-artifact@v4
        with:
          name: unified-research-report
          path: |
            data/*scan*.csv
            data/*summary*.json
            site/data/research-report.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
