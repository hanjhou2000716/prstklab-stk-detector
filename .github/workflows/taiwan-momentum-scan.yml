name: Manual Taiwan momentum scan
on:
  workflow_dispatch:
    inputs:
      limit:
        description: Number of Taiwan stocks to scan (start with 300)
        required: true
        default: '300'
      batch_size:
        description: Symbols per public-data request
        required: true
        default: '50'
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - run: python -m src.run_taiwan_momentum_scan --limit ${{ inputs.limit }} --batch-size ${{ inputs.batch_size }}
      - uses: actions/upload-artifact@v4
        with:
          name: taiwan-momentum-scan
          path: data/taiwan-momentum-scan.csv
